# ============================================================================
# POLAY Testnet - Nginx Reverse Proxy Configuration
# ============================================================================

# Rate limiting zone for RPC requests
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=100r/s;

# Upstream definitions
upstream polay_rpc {
    server validator:9944;
}

upstream polay_faucet {
    server faucet:8080;
}

upstream polay_explorer_api {
    server explorer-api:3001;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ---- TLS (Let's Encrypt) ----
    ssl_certificate     /etc/letsencrypt/live/polay-testnet/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/polay-testnet/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data:; font-src 'self';" always;

    # ---- Request limits ----
    client_max_body_size 2M;

    # ---- JSON-RPC endpoint ----
    location /rpc {
        limit_req zone=rpc_limit burst=200 nodelay;

        proxy_pass http://polay_rpc/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ---- WebSocket endpoint ----
    location /ws {
        proxy_pass http://polay_rpc/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- Faucet API ----
    location /faucet {
        proxy_pass http://polay_faucet/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Explorer API ----
    location /api {
        proxy_pass http://polay_explorer_api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Explorer static files ----
    location / {
        root /var/www/polay-explorer;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- Faucet UI static files ----
    location /faucet-ui {
        alias /var/www/polay-faucet;
        try_files $uri $uri/ /faucet-ui/index.html;
    }

    # ---- Error pages ----
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
