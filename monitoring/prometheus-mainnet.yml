global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: polay-mainnet
    static_configs:
      - targets:
          - metrics-exporter:9100
        labels:
          network: mainnet
